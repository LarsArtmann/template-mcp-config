name: Release

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun run test

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create CHANGELOG
        run: |
          # Extract commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            LOG=$(git log --oneline -20)
          else
            LOG=$(git log $LAST_TAG..HEAD --oneline)
          fi

          # Create release notes
          cat > release-notes.md << 'EOF'
          ## What's Changed

          ### New Features
          EOF

          echo "$LOG" | grep "^feat" | sed 's/^[a-f0-9]* /- /' >> release-notes.md || true

          cat >> release-notes.md << 'EOF'

          ### Bug Fixes
          EOF

          echo "$LOG" | grep "^fix" | sed 's/^[a-f0-9]* /- /' >> release-notes.md || true

          cat >> release-notes.md << 'EOF'

          ### Documentation
          EOF

          echo "$LOG" | grep "^docs" | sed 's/^[a-f0-9]* /- /' >> release-notes.md || true

          cat >> release-notes.md << 'EOF'

          ### Other Changes
          EOF

          echo "$LOG" | grep -v "^feat\|^fix\|^docs" | sed 's/^[a-f0-9]* /- /' >> release-notes.md || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'alpha') || contains(steps.version.outputs.VERSION, 'beta') || contains(steps.version.VERSION, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-package:
    name: Publish to npm (optional)
    runs-on: ubuntu-latest
    needs: release
    if: false # Disable if not publishing to npm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Publish to npm
        run: bun pm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
